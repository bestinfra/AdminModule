component_architecture:
  patterns:
    - "Atomic Design"
    - "Container/Presentational Pattern"
    - "Compound Components"
    - "Render Props Pattern"

component_types:
  atoms:
    description: "Basic building blocks - buttons, inputs, icons"
    location: "src/components/global/"
    examples:
      - "Button.tsx"
      - "Input.tsx"
      - "LoadingSpinner.tsx"
    naming: "PascalCase"
    props_interface: "ComponentNameProps"
    export_type: "named export"

  molecules:
    description: "Simple combinations of atoms"
    location: "src/components/global/"
    examples:
      - "Card.tsx"
      - "Table.tsx"
      - "TimeRangeSelector.tsx"
    dependencies: "atoms"
    state_management: "local state only"

  organisms:
    description: "Complex UI sections"
    location: "src/components/layout/"
    examples:
      - "Header.tsx"
      - "Sidebar.tsx"
      - "MainLayout.tsx"
    dependencies: "atoms, molecules"
    state_management: "context or props"

  templates:
    description: "Page-level layouts"
    location: "src/pages/"
    examples:
      - "Dashboard.tsx"
      - "ModuleSelection.tsx"
      - "Ticket.tsx"
    dependencies: "organisms, molecules, atoms"
    state_management: "context, hooks, API calls"

  pages:
    description: "Complete page implementations"
    location: "src/pages/"
    routing: "React Router"
    data_fetching: "API calls, context"
    error_handling: "Error boundaries"

component_structure:
  file_organization:
    - "Component file (.tsx)"
    - "Types file (if complex) (.types.ts)"
    - "Styles file (if needed) (.module.css)"
    - "Test file (.test.tsx)"

  component_template:
    imports:
      - "React imports"
      - "TypeScript types"
      - "Third-party libraries"
      - "Local components"
    
    types:
      - "Props interface"
      - "State interface (if needed)"
      - "Event handlers"
    
    component:
      - "Function component declaration"
      - "Props destructuring"
      - "State management"
      - "Event handlers"
      - "Effects (if needed)"
      - "Render logic"
    
    exports:
      - "Named export for component"
      - "Type exports (if needed)"

naming_conventions:
  files:
    - "PascalCase for component files"
    - "camelCase for utility files"
    - "kebab-case for CSS files"
  
  components:
    - "PascalCase for component names"
    - "Descriptive and semantic names"
    - "Avoid abbreviations"
  
  props:
    - "camelCase for prop names"
    - "Boolean props start with 'is', 'has', 'can'"
    - "Event handlers start with 'on'"
    - "Callback props end with 'Callback' or 'Handler'"

props_patterns:
  required_props:
    - "Essential functionality"
    - "No default values"
    - "Clear TypeScript types"
  
  optional_props:
    - "Default values provided"
    - "Marked with '?' in TypeScript"
    - "Sensible defaults"
  
  children_props:
    - "React.ReactNode type"
    - "Flexible content rendering"
    - "Compound component support"

state_management:
