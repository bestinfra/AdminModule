component_examples:
  
  # Example 1: Atom Component (Button)
  button_component:
    file_path: "src/components/global/Button.tsx"
    component_type: "atom"
    description: "Reusable button component with variants"
    
    structure:
      imports:
        - "import React from 'react';"
        - "import { ButtonHTMLAttributes } from 'react';"
      
      types:
        - "interface ButtonProps extends ButtonHTMLAttributes<HTMLButtonElement> {"
        - "  variant?: 'primary' | 'secondary' | 'danger' | 'ghost';"
        - "  size?: 'sm' | 'md' | 'lg';"
        - "  isLoading?: boolean;"
        - "  children: React.ReactNode;"
        - "}"
      
      component:
        - "const Button: React.FC<ButtonProps> = ({"
        - "  variant = 'primary',"
        - "  size = 'md',"
        - "  isLoading = false,"
        - "  children,"
        - "  className = '',"
        - "  disabled,"
        - "  ...props"
        - "}) => {"
        - "  const baseClasses = 'inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2';"
        - "  const variantClasses = {"
        - "    primary: 'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500',"
        - "    secondary: 'bg-gray-200 text-gray-900 hover:bg-gray-300 focus:ring-gray-500',"
        - "    danger: 'bg-red-600 text-white hover:bg-red-700 focus:ring-red-500',"
        - "    ghost: 'bg-transparent text-gray-700 hover:bg-gray-100 focus:ring-gray-500'"
        - "  };"
        - "  const sizeClasses = {"
        - "    sm: 'px-3 py-1.5 text-sm',"
        - "    md: 'px-4 py-2 text-base',"
        - "    lg: 'px-6 py-3 text-lg'"
        - "  };"
        - "  return ("
        - "    <button"
        - "      className={`${baseClasses} ${variantClasses[variant]} ${sizeClasses[size]} ${className}`}"
        - "      disabled={disabled || isLoading}"
        - "      {...props}"
        - "    >"
        - "      {isLoading && <LoadingSpinner size='sm' className='mr-2' />}"
        - "      {children}"
        - "    </button>"
        - "  );"
        - "};"
      
      export:
        - "export default Button;"

  # Example 2: Molecule Component (Card)
  card_component:
    file_path: "src/components/global/Card.tsx"
    component_type: "molecule"
    description: "Card component with header, content, and footer"
    
    structure:
      imports:
        - "import React from 'react';"
        - "import { ReactNode } from 'react';"
      
      types:
        - "interface CardProps {"
        - "  title?: string;"
        - "  subtitle?: string;"
        - "  children: ReactNode;"
        - "  footer?: ReactNode;"
        - "  className?: string;"
        - "  onClick?: () => void;"
        - "  isClickable?: boolean;"
        - "}"
      
      component:
        - "const Card: React.FC<CardProps> = ({"
        - "  title,"
        - "  subtitle,"
        - "  children,"
        - "  footer,"
        - "  className = '',"
        - "  onClick,"
        - "  isClickable = false"
        - "}) => {"
        - "  const baseClasses = 'bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700';"
        - "  const clickableClasses = isClickable ? 'cursor-pointer hover:shadow-md transition-shadow' : '';"
        - "  return ("
        - "    <div"
        - "      className={`${baseClasses} ${clickableClasses} ${className}`}"
        - "      onClick={onClick}"
        - "    >"
        - "      {(title || subtitle) && ("
        - "        <div className='px-6 py-4 border-b border-gray-200 dark:border-gray-700'>"
        - "          {title && <h3 className='text-lg font-semibold text-gray-900 dark:text-white'>{title}</h3>}"
        - "          {subtitle && <p className='text-sm text-gray-600 dark:text-gray-400 mt-1'>{subtitle}</p>}"
        - "        </div>"
        - "      )}"
        - "      <div className='px-6 py-4'>{children}</div>"
        - "      {footer && ("
        - "        <div className='px-6 py-4 border-t border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-700 rounded-b-lg'>"
        - "          {footer}"
        - "        </div>"
        - "      )}"
        - "    </div>"
        - "  );"
        - "};"
      
      export:
        - "export default Card;"

  # Example 3: Organism Component (Header)
  header_component:
    file_path: "src/components/layout/Header.tsx"
    component_type: "organism"
    description: "Application header with navigation and user menu"
    
    structure:
      imports:
        - "import React, { useState } from 'react';"
        - "import { useTheme } from '../../providers/ThemeProvider';"
        - "import Button from '../global/Button';"
        - "import { MoonIcon, SunIcon, UserIcon } from 'react-icons';"
      
      types:
        - "interface HeaderProps {"
        - "  onMenuToggle?: () => void;"
        - "  isMenuOpen?: boolean;"
        - "  user?: {"
        - "    name: string;"
        - "    email: string;"
        - "    avatar?: string;"
        - "  };"
        - "}"
      
      component:
        - "const Header: React.FC<HeaderProps> = ({"
        - "  onMenuToggle,"
        - "  isMenuOpen = false,"
        - "  user"
        - "}) => {"
        - "  const { theme, toggleTheme } = useTheme();"
        - "  const [isUserMenuOpen, setIsUserMenuOpen] = useState(false);"
        - "  return ("
        - "    <header className='bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-3'>"
        - "      <div className='flex items-center justify-between'>"
        - "        <div className='flex items-center space-x-4'>"
        - "          <button"
        - "            onClick={onMenuToggle}"
        - "            className='p-2 rounded-md text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700'"
        - "          >"
        - "            <MenuIcon className='w-5 h-5' />"
        - "          </button>"
        - "          <h1 className='text-xl font-semibold text-gray-900 dark:text-white'>Admin Module</h1>"
        - "        </div>"
        - "        <div className='flex items-center space-x-3'>"
        - "          <Button"
        - "            variant='ghost'"
        - "            size='sm'"
        - "            onClick={toggleTheme}"
        - "            aria-label={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}"
        - "          >"
        - "            {theme === 'dark' ? <SunIcon className='w-4 h-4' /> : <MoonIcon className='w-4 h-4' />}"
        - "          </Button>"
        - "          {user && ("
        - "            <div className='relative'>"
        - "              <button"
        - "                onClick={() => setIsUserMenuOpen(!isUserMenuOpen)}"
        - "                className='flex items-center space-x-2 p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-700'"
        - "              >"
        - "                <UserIcon className='w-5 h-5 text-gray-600 dark:text-gray-400' />"
        - "                <span className='text-sm font-medium text-gray-900 dark:text-white'>{user.name}</span>"
        - "              </button>"
        - "              {isUserMenuOpen && ("
        - "                <div className='absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-md shadow-lg border border-gray-200 dark:border-gray-700'>"
        - "                  <div className='py-1'>"
        - "                    <a href='#' className='block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'>Profile</a>"
        - "                    <a href='#' className='block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'>Settings</a>"
        - "                    <a href='#' className='block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'>Sign out</a>"
        - "                  </div>"
        - "                </div>"
        - "              )}"
        - "            </div>"
        - "          )}"
        - "        </div>"
        - "      </div>"
        - "    </header>"
        - "  );"
        - "};"
      
      export:
        - "export default Header;"

  # Example 4: Page Component (Dashboard)
  dashboard_component:
    file_path: "src/pages/Dashboard.tsx"
    component_type: "page"
    description: "Dashboard page with analytics and data visualization"
    
    structure:
      imports:
        - "import React, { useState, useEffect } from 'react';"
        - "import { useNavigate } from 'react-router-dom';"
        - "import MainLayout from '../components/layout/MainLayout';"
        - "import Card from '../components/global/Card';"
        - "import { BarChart, LineChart, PieChart } from '../graphs';"
        - "import { useAppContext } from '../context/AppContext';"
        - "import CardSkeleton from '../components/skeletons/CardSkeleton';"
      
      types:
        - "interface DashboardData {"
        - "  totalTickets: number;"
        - "  openTickets: number;"
        - "  resolvedTickets: number;"
        - "  chartData: {"
        - "    labels: string[];"
        - "    datasets: Array<{"
        - "      label: string;"
        - "      data: number[];"
        - "      backgroundColor?: string;"
        - "    }>;"
        - "  };"
        - "}"
      
      component:
        - "const Dashboard: React.FC = () => {"
        - "  const navigate = useNavigate();"
        - "  const { theme } = useAppContext();"
        - "  const [loading, setLoading] = useState(true);"
        - "  const [dashboardData, setDashboardData] = useState<DashboardData | null>(null);"
        - "  const [error, setError] = useState<string | null>(null);"
        - "  useEffect(() => {"
        - "    const fetchDashboardData = async () => {"
        - "      try {"
        - "        setLoading(true);"
        - "        // Simulate API call"
        - "        const response = await fetch('/api/dashboard');"
        - "        if (!response.ok) throw new Error('Failed to fetch dashboard data');"
        - "        const data = await response.json();"
        - "        setDashboardData(data);"
        - "      } catch (err) {"
        - "        setError(err instanceof Error ? err.message : 'An error occurred');"
        - "      } finally {"
        - "        setLoading(false);"
        - "      }"
        - "    };"
        - "    fetchDashboardData();"
        - "  }, []);"
        - "  if (error) {"
        - "    return ("
        - "      <MainLayout>"
        - "        <div className='flex items-center justify-center h-64'>"
        - "          <div className='text-center'>"
        - "            <p className='text-red-600 dark:text-red-400 mb-4'>{error}</p>"
        - "            <Button onClick={() => window.location.reload()}>Retry</Button>"
        - "          </div>"
        - "        </div>"
        - "      </MainLayout>"
        - "    );"
        - "  }"
        - "  return ("
        - "    <MainLayout>"
        - "      <div className='space-y-6'>"
        - "        <div className='flex items-center justify-between'>"
        - "          <h1 className='text-2xl font-bold text-gray-900 dark:text-white'>Dashboard</h1>"
        - "          <Button onClick={() => navigate('/tickets/new')}>Create Ticket</Button>"
        - "        </div>"
        - "        {loading ? ("
        - "          <div className='grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6'>"
        - "            {Array.from({ length: 4 }).map((_, index) => ("
        - "              <CardSkeleton key={index} />"
        - "            ))}"
        - "          </div>"
        - "        ) : dashboardData ? ("
        - "          <>"
        - "            <div className='grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6'>"
        - "              <Card title='Total Tickets' subtitle='All time'>"
        - "                <div className='text-3xl font-bold text-blue-600'>{dashboardData.totalTickets}</div>"
        - "              </Card>"
        - "              <Card title='Open Tickets' subtitle='Currently active'>"
        - "                <div className='text-3xl font-bold text-orange-600'>{dashboardData.openTickets}</div>"
        - "              </Card>"
        - "              <Card title='Resolved Tickets' subtitle='Completed'>"
        - "                <div className='text-3xl font-bold text-green-600'>{dashboardData.resolvedTickets}</div>"
        - "              </Card>"
        - "            </div>"
        - "            <div className='grid grid-cols-1 lg:grid-cols-2 gap-6'>"
        - "              <Card title='Ticket Trends'>"
        - "                <LineChart data={dashboardData.chartData} />"
        - "              </Card>"
        - "              <Card title='Ticket Distribution'>"
        - "                <PieChart data={dashboardData.chartData} />"
        - "              </Card>"
        - "            </div>"
        - "          </>"
        - "        ) : null}"
        - "      </div>"
        - "    </MainLayout>"
        - "  );"
        - "};"
      
      export:
        - "export default Dashboard;"

  # Example 5: Custom Hook
  custom_hook:
    file_path: "src/hooks/useApi.ts"
    component_type: "custom_hook"
    description: "Custom hook for API calls with loading and error states"
    
    structure:
      imports:
        - "import { useState, useEffect, useCallback } from 'react';"
      
      types:
        - "interface UseApiOptions<T> {"
        - "  url: string;"
        - "  method?: 'GET' | 'POST' | 'PUT' | 'DELETE';"
        - "  body?: any;"
        - "  headers?: Record<string, string>;"
        - "  dependencies?: any[];"
        - "  onSuccess?: (data: T) => void;"
        - "  onError?: (error: string) => void;"
        - "}"
      
      hook:
        - "export function useApi<T>({"
        - "  url,"
        - "  method = 'GET',"
        - "  body,"
        - "  headers = {},"
        - "  dependencies = [],"
        - "  onSuccess,"
        - "  onError"
        - "}: UseApiOptions<T>) {"
        - "  const [data, setData] = useState<T | null>(null);"
        - "  const [loading, setLoading] = useState(false);"
        - "  const [error, setError] = useState<string | null>(null);"
        - "  const fetchData = useCallback(async () => {"
        - "    try {"
        - "      setLoading(true);"
        - "      setError(null);"
        - "      const response = await fetch(url, {"
        - "        method,"
        - "        headers: {"
        - "          'Content-Type': 'application/json',"
        - "          ...headers"
        - "        },"
        - "        body: body ? JSON.stringify(body) : undefined"
        - "      });"
        - "      if (!response.ok) {"
        - "        throw new Error(`HTTP error! status: ${response.status}`);"
        - "      }"
        - "      const result = await response.json();"
        - "      setData(result);"
        - "      onSuccess?.(result);"
        - "    } catch (err) {"
        - "      const errorMessage = err instanceof Error ? err.message : 'An error occurred';"
        - "      setError(errorMessage);"
        - "      onError?.(errorMessage);"
        - "    } finally {"
        - "      setLoading(false);"
        - "    }"
        - "  }, [url, method, body, headers, onSuccess, onError]);"
        - "  useEffect(() => {"
        - "    fetchData();"
        - "  }, dependencies);"
        - "  return { data, loading, error, refetch: fetchData };"
        - "}"

component_creation_workflow:
  1_planning:
    - "Identify component type (atom, molecule, organism, page)"
    - "Define component responsibilities"
    - "Plan props interface"
    - "Consider reusability and composition"
  
  2_implementation:
    - "Create component file with proper naming"
    - "Define TypeScript interfaces"
    - "Implement component logic"
    - "Add proper styling with Tailwind CSS"
    - "Handle loading and error states"
    - "use symantic html elements"
  
  3_testing:
    - "Write unit tests for component"
    - "Test different prop combinations"
    - "Test user interactions"
    - "Test accessibility features"
  
  4_documentation:
    - "Add JSDoc comments"
    - "Document props and their types"
    - "Add to component library if reusable"

  
  5_integration:
    - "Import and use in parent components"
    - "Test integration with other components"
    - "Verify responsive behavior"
    - "Check theme compatibility"

best_practices:
  - "Always use TypeScript for type safety"
  - "Follow the single responsibility principle"
  - "Make components as reusable as possible"
  - "Use proper semantic HTML elements"
  - "Implement proper error boundaries"
  - "Add loading states for better UX"
  - "Ensure accessibility compliance"
  - "Write comprehensive tests"
  - "Use consistent naming conventions"
  - "Use consistent styling with Tailwind CSS"
  - "Optimize for performance with memoization" 